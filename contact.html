<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شارك خبر | إسماعيل نيوز</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { background-color: #161b22; padding: 20px; text-align: center; border-bottom: 2px solid #238636; }
        header h1 { color: #ffffff; margin: 0; font-size: 2rem; }
        nav { background-color: #1f242c; padding: 10px; text-align: center; border-bottom: 1px solid #30363d; }
        nav a { color: #58a6ff; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .form-box { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 30px; }
        .form-box h2 { color: white; margin-top: 0; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #c9d1d9; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; box-sizing: border-box; }
        .form-group input:focus, .form-group textarea:focus { border-color: #58a6ff; outline: none; }
        .btn { background-color: #238636; color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn:hover { background-color: #2ea043; }
        footer { text-align: center; padding: 20px; background-color: #161b22; color: #8b949e; border-top: 1px solid #30363d; margin-top: 40px; }
    </style>
</head>
<body>
    <header><h1>✍️ المساهمة الإخبارية العالمية</h1></header>
    <nav>
        <a href="index.html">🏠 الرئيسية</a>
        <a href="sec-news.html">🛡️ أمن سيبراني</a>
        <a href="contact.html">✍️ راسلنا / شارك خبر</a>
    </nav>
    <div class="container">
        <div class="form-box">
            <h2>📮 صندق إرسال الأخبار المشفر والآمن</h2>
            <form action="https://formspree.io/f/ismailhamroun2@gmail.com" method="POST">
                <div class="form-group">
                    <label>الاسم الكامل / المستعار:</label>
                    <input type="text" name="name" placeholder="مثال: إسماعيل الحمرون" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني الآمن:</label>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>تفاصيل الخبر أو البلاغ:</label>
                    <textarea name="message" rows="6" placeholder="اكتب تفاصيل الخبر هنا..." required></textarea>
                </div>
                <button type="submit" class="btn">🚀 إرسال مشفر ديريكت</button>
            </form>
        </div>
    </div>
    <footer>جميع الحقوق محفوظة © 2026 | شبكة إسماعيل نيوز الآمنة</footer>
</body>
</html>
